<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova Offerta</title>
    <!-- bootstrap -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
</head>

<body>
    <!-- header -->
    <div th:replace="~{ fragments/navbar :: navbar }"></div>

    <main>
        <div class="container mt-5">
            <form th:action="@{'/offers/edit/' + offer.id}" method="POST" th:object="${offer}">
                <h3>Modifica offerta [[${offer.getTitle()}]]</h3>
                <div class="mb-3">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{pizza.id}">
                    <label for="title" class="form-label">Titolo Offerta</label>
                    <input type="text" class="form-control" id="title" th:field="*{title}" th:errorClass="is-invalid">
                    <!-- usiamo inbuilt func di thymeleaf per mostrare gli errori del campo, se ce ne sono -->
                    <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback">
                        <li th:each="err : ${#fields.errors('title')}" th:text="${err}"></li>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="startDate" class="form-label">Data Inizio</label>
                    <input type="date" class="form-control" id="startDate" th:field="*{startDate}" th:errorClass="is-invalid">
                    <div th:if="${#fields.hasErrors('startDate')}" class="invalid-feedback">
                        <li th:each="err : ${#fields.errors('startDate')}" th:text="${err}"></li>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="endDate" class="form-label">Data Fine</label>
                    <input type="date" class="form-control" id="endDate" th:field="*{endDate}" th:errorClass="is-invalid">
                    <div th:if="${#fields.hasErrors('endDate')}" class="invalid-feedback">
                        <li th:each="err : ${#fields.errors('endDate')}" th:text="${err}"></li>
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">Aggiungi offerta</button>
                    <button type="reset" class="btn btn-warning">Reset dati</button>
                </div>
            </form>
        </div>

    </main>
</body>

</html>
